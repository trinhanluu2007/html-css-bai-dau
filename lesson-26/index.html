<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Video, Audio</title>
</head>
<body>
    <!-- Video -->
    <h1>Video</h1>
    <video width="320" height="240" controls playsinline loop poster="images\coffee.jpg">
        <source src="videos\How To Make the Perfect Coffee - HowToBasic (720p, h264).mp4" type="video/mp4">
        Trinh duyet cua ban khong ho tro hien thi video
    </video>

    <!-- Audio -->
    <h1>Audio</h1>
    <audio controls autoplay muted loop>
        <source src="audios\230205_1898.mp3" type="audio/mp3">
        Trinh duyet cua ban khong ho tro tep am thanh
    </audio>
</body>
</html>
