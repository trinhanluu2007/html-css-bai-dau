    <!-- Cach 3: async - <script> duoc tai song song voi HTML, nhung se thuc thi ngay sau khi tai xong (co the lam gian doan qua trinh tai HTML de chay javascript). Phu hop cho cac <script> doc lap, khong phu thuoc thu tu.-->
</head>
