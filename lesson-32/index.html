<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form Validation</title>
</head>
<body>
    <!-- 
    required: Bắt buộc người dùng phải nhập dữ liệu
    min: Yêu cầu giá trị tối thiểu cho input number, date…vv
    max: yêu cầu giá trị tối đa cho input number, date…vv
    pattern: Dùng để validate điều kiện phức tạp với biểu thức chính quy Regex
    minlength: Độ dài chuỗi tối thiểu cần phải nhập, thường dùng cho input text
    maxlength: Độ dài chuỗi tối đa cần phải nhập,  thường dùng cho input text
    -->
    <form>
        <label>Name:</label>
        <input type="text" name="name" required minlength="3">
        <br><br>

        <label>Email:</label>
        <input type="email" name="email" required>
        <br><br>

        <label>Phone:</label>
        <input type="tel" name="phone" pattern="^[0-9]{10}$" title="Enter 10 digits" required>
        <br><br>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
