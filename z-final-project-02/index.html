    <!-- Su dung 2 bo Icon pho bien la Font Awesome va Devicon (cdn) -->
    <!--
        + rel="stylesheet": Cho trinh duyet biet day la mot file thiet ke giao dien CSS.

        + integrity: Mot ma khoa bao mat. Trinh duyet dua vao ma nay de kiem tra xem file tai tu CDN ve co bi ai sua doi, chen ma doc hay khong.

        + crossorigin="anonymous": Yeu cau trinh duyet lay du lieu ve mot cach an danh, nghia la khong mang theo Cookie, mat khau hay thong tin gi khac cua nguoi dung. Dai loai la de bao ve thong tin cho ban.

        + referrerpolicy="no-referrer": Khong cho trinh duyet tiet lo voi may chu tai nguyen la ban dang dung tu trang web nao trong luc tai file du lieu ve.
    -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/devicon/2.17.0/devicon.min.css" integrity="sha512-6/05LVs+grXBAu5XzdiMFB64yCVF9FL70zWrTKcaTEKygrO7fC5LqfL/SKPpuRpimL2aE0D7Hw/NoED+7+7/VQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
