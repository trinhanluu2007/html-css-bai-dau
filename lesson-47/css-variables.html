<!DOCTYPE html>
<html lang="en">
<!-- Thử hình dung trong một dự án lớn, những file css dài vài trăm đến vài nghìn dòng. Nếu mọi chỗ cứ lặp đi lặp lại một cái mã màu xanh lá kiểu: color: #2ecc71; khoảng 500 lần đi.

Một ngày đẹp trời, khách hàng muốn đổi tone màu thương hiệu cho toàn bộ dự án. Chẳng lẽ lúc đó chúng ta lại đi sửa tận 500 lần? Dĩ nhiên là vẫn làm được nhưng mà nó không chuyên nghiệp :))

Giải pháp: CSS Variables (Custom Properties). Định nghĩa màu đó ở một nơi duy nhất, khai báo một lần và dùng ở mọi nơi. Khi cần thay đổi, chỉ cần sửa đúng 1 dòng code. -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Variables</title>

    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header>
        <p class="title">Tại sao nên sử dụng CSS Variables?</p>
    </header>

    <main>
        <p class="main-content">Tại vì nó hay chứ còn gì nữa.</p>
    </main>

    <footer>
        <p class="signature">TrungQuanDev - Một lập trình viên</p>
    </footer>

    <button class="btn-theme" onclick="document.body.classList.toggle('dark-theme')">
        🌓 Đổi Giao Diện (Dark/Light)
    </button>

</body>

</html>
