<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Date, Time</title>
</head>
<body>
    <form>
        <label>Choose a booking date:</label><br>
        <input
        type="date"
        name="booking_date"
        min="2026-06-26"
        max="2026-08-26"
        required>
        <br><br>
        
        <input
        type="datetime-local"
        name="meeting-time"
        id="meeting-time"
        value="2026-06-26T21:58">
        <br><br>

        <button type="submit">Confirm</button>
    </form>
</body>
</html>
