<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile First</title>

    <!-- Mobile-First (Ưu tiên cho Điện thoại trước): Ngược lại là chúng ta sẽ đi code giao diện cho màn hình nhỏ nhất (Điện thoại) trước. Sau đó dùng các điều kiện CSS media min-width để "phóng to" và mở rộng bố cục trang web khi hiển thị trên màn hình (PC/Laptop) lớn hơn.
    => “Tùy dự án. Và thường dùng nhiều hơn trong các dự án thực tế cần tối ưu hiệu năng mobile.” -->

    <!-- Responsive: Một trang web hiện đại bắt buộc phải tự động co giãn và thay đổi bố cục mượt mà trên mọi thiết bị từ PC, Máy tính bảng cho đến Điện thoại. Kỹ thuật CSS để làm điều đó được gọi là “Responsive Web Design”.

    Media Queries: là một tính năng của CSS cho phép chúng ta áp dụng các đoạn code CSS khác nhau dựa trên kích thước màn hình (hoặc loại thiết bị) đang hiển thị trang web 
    
    Lưu ý quan trọng: Để Media Queries hoạt động được trên các thiết bị mobile thật thì trong file HTML phải có thẻ Meta Viewport (nhớ lại bài học số 21. HTML Head và Meta) -->

    <!-- Breakpoints: Trong thực tế, chúng không cần phải xử lý Fix cứng kích thước cho từng dòng điện thoại như: iPhone, Samsung, iPad…, mà chỉ cần nhớ bộ khung Breakpoints chuẩn chia theo nhóm thiết bị của các CSS Framework lớn như: Bootstrap, Tailwind CSS (Shadcn/ui), Material UI, Ant Design… -->

    <!-- TailwindCSS Breakpoints: https://v1.tailwindcss.com/docs/breakpoints -->

    <style>
        /* 1. CSS ban đầu cho MOBILE (Màn hình nhỏ) */
        .container-mobile {
            display: flex;
            gap: 20px;
            flex-direction: column; /* Xếp dọc trên mobile */
        }
        .card-item {
            background-color: #e74c3c; /* Màu đỏ */
            padding: 20px;
            text-align: center;
        }

        /* 2. Viết CSS trên Desktop (Từ 768px trở lên) */
        @media (min-width: 768px) {
            .container-mobile {
                flex-direction: row; /* Trình duyệt mở rộng thì dàn hàng ngang */
            }
            .card-item {
                flex: 1;
                background-color: #2ecc71; /* Màu xanh lá */
            }
        }

    </style>
</head>
<body>
    <div class="container-mobile">
        <div class="card-item">Card 1</div>
        <div class="card-item">Card 2</div>
        <div class="card-item">Card 3</div>
    </div>

</body>
</html>
