<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Input</title>
</head>
<body>
    <form name="register-form">
        <label for="username">Username:</label>
        <input type="text" name="fullname" id="username" placeholder="Enter your username..." required value="Luu Tri Nhan" readonly>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" name="email" style="width: 200px;" required>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" name="password" id="password" required value="heovang2007" disabled>
        <br><br>

        <label for="dob">Date of birth:</label>
        <input type="date" name="dob" id="dob">
        <br><br>

        <label for="color">Your favorite color:</label>
        <input type="color" name="color" id="color">
        <br><br>

        <button type="submit">Register</button>
        <br><br>

        <a href="https://www.w3schools.com/html/html_form_attributes.asp">https://www.w3schools.com/html/html_form_attributes.asp</a>
    </form>
</body>
</html>
