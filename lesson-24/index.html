<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Elements</title>
</head>
<body>
    <div class="header">
        Day la noi dung cua the header !
    </div>
    <br>
    <header>
        Day la noi dung cua the header !
    </header>
    <!--Một vài thẻ Semantic:
    <article> <main> <header> <footer> <aside>
    <details> <summary> <figcaption> <figure> <mark> 
    <section> <time> <nav>
    -->
    <br>
    <header></header>
    <section>
        <article>
            <figure>
                <img src="image\dog1.jpg" alt="dog-1" style="width: 300px;">
                <figcaption>Dog Image 1</figcaption>
            </figure>
        </article>
    </section>
    <footer></footer>
    <br>
    <div class="header"></div>
    <div class="section">
        <div class="article">
            <div class="figure">
                <img src="image\dog2.jpg" alt="dog-2">
                <div class="figcaption">Dog Image 2</div>
            </div>
        </div>
    </div>
    <div class="footer"></div>
</body>
</html>
