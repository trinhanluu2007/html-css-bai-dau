<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Color</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- color: -> Uu tien thu tu o duoi CAO nhat va tren cung la THAP nhat rgba(255, 0, 0, 0.5) la CAO nhat => 1 la DAM nhat, 0 la MO nhat -->
    <style>
        p {
            font-size: 20px;
            font-family: "Raleway", sans-serif;
            font-style: italic;
            font-weight: bold;
            text-align: center;
            text-transform: capitalize;
            line-height: 40px;

            color: rgb(255, 0, 0);
            color: #44bd32;
            color: rgba(255, 0, 0, 0.5);
            opacity: 0.8;
            padding: 50px;
            background: linear-gradient(to right, red, yellow);
            background: radial-gradient(circle, red, yellow);
            background: linear-gradient(45deg, #4159d0 0.000%, #c84fc0 50.000%, #ffcd70 100.000%);
        }
    </style>
</head>
<body>
    <a target="_blank" href="https://flatuicolors.com/">https://flatuicolors.com/</a>
    <br>
    <a target="_blank" href="https://cssgradient.io/gradient-backgrounds/">https://cssgradient.io/gradient-backgrounds/</a>
    <p>hello world! Luu Tri Nhan</p>
    <p style="color: red;">hello world! Luu Tri Nhan</p>
    <p style="color: blue;">hello world! Luu Tri Nhan</p>
    <p style="color: green;">hello world! Luu Tri Nhan</p>
    <p style="color: yellow">hello world! Luu Tri Nhan</p>
    <p style="color: orange">hello world! Luu Tri Nhan</p>
    <p style="color: purple;">hello world! Luu Tri Nhan</p>
</body>
</html>
